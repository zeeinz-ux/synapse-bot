<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <span class="footer-brand-text">𝓢𝓎𝓃𝒶𝓅𝓈ℯ</span>
    </div>
    <ul class="footer-links">
      <li><a href="#home">{{ "nav.home" | t }}</a></li>
      <li><a href="#faq">{{ "nav.faq" | t }}</a></li>
      <li><a href="#commands">{{ "nav.commands" | t }}</a></li>
      <li><a href="#about">{{ "nav.about" | t }}</a></li>
      <li><a href="https://discord.gg/kwPr32AhGH" target="_blank" rel="noopener noreferrer">{{ "nav.support" | t }}</a></li>
    </ul>
    <div class="footer-actions">
      {% if user %}
      <a href="/dashboard" class="btn-footer-dashboard">🔓 {{ "hero.dashboard" | t }}</a>
      {% else %}
      <a href="/login" class="btn-footer-login">🔒 {{ "hero.dashboard" | t }}</a>
      {% endif %}
      <a href="https://discord.com/oauth2/authorize?client_id=1505849571039907900&permissions=8&integration_type=0&scope=bot%20applications.commands"
         target="_blank" rel="noopener noreferrer"
         class="btn-footer-invite">{{ "nav.invite" | t }}</a>
    </div>
  </div>
  <div class="footer-bottom">
    <span>{{ "footer.copyright" | t }}</span>
  </div>
</footer>
